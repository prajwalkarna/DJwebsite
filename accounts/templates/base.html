<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Website{% endblock %}</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background-color: #f0f2f5;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .card {
                background: white;
                border-radius: 12px;
                padding: 40px;
                width: 100%;
                max-width: 400px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            }

            .card h1 {
                font-size: 24px;
                font-weight: 600;
                text-align: center;
                margin-bottom: 28px;
                color: #1a1a1a;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .form-group label {
                display: block;
                font-size: 14px;
                font-weight: 500;
                color: #444;
                margin-bottom: 6px;
            }

            .form-group input,
            .form-group select {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 14px;
                color: #1a1a1a;
                outline: none;
                transition: border-color 0.2s;
            }

            .form-group input:focus,
            .form-group select:focus {
                border-color: #4a90e2;
            }

            .btn {
                width: 100%;
                padding: 11px;
                background-color: #4a90e2;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                margin-top: 8px;
                transition: background-color 0.2s;
            }

            .btn:hover {
                background-color: #357abd;
            }

            .footer-text {
                text-align: center;
                margin-top: 20px;
                font-size: 13px;
                color: #666;
            }

            .footer-text a {
                color: #4a90e2;
                text-decoration: none;
                font-weight: 500;
            }

            .errorlist {
                color: #e74c3c;
                font-size: 13px;
                list-style: none;
                margin-top: 4px;
            }

            .error-box {
                background: #fef0f0;
                border: 1px solid #f5c6c6;
                border-radius: 8px;
                padding: 10px 14px;
                color: #c0392b;
                font-size: 13px;
                margin-bottom: 16px;
            }

            {% block extra_styles %}{% endblock %}
        </style>
    </head>
    <body>
        {% block content %}{% endblock %}
    </body>
</html>
